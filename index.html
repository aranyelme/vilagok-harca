<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="Világok Harca — interaktív krónika az Aranyelme műhely gyermekei által teremtett világ történelméből." />
  <title>Világok Harca — Krónika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=6" />
  <link rel="stylesheet" href="css/cards.css?v=6" />
</head>
<body class="view-map">
  <header class="topbar">
    <button class="menu-btn" id="menuBtn" aria-label="Menü">
      <span></span><span></span><span></span>
    </button>
    <h1 class="title">Világok Harca</h1>
    <nav class="view-nav" aria-label="Nézetváltó">
      <button class="nav-btn active" data-view="map">Térkép</button>
      <button class="nav-btn" data-view="gallery">Kártyák</button>
      <button class="nav-btn" data-view="chronicle" disabled title="Hamarosan">Krónika</button>
    </nav>
  </header>

  <main id="app">
    <!-- MAP VIEW -->
    <section class="view map-view" id="mapView">
      <div class="map-viewport" id="mapViewport">
        <div class="map-canvas" id="mapCanvas">
          <img class="map-image" id="mapImage" src="assets/map/terkep_lo.jpg" alt="A világ térképe" draggable="false" decoding="async" fetchpriority="high" />
          <div class="hotspots-layer" id="hotspotsLayer" aria-label="Helyszínek"></div>
        </div>
        <div class="map-vignette" aria-hidden="true"></div>
      </div>
      <div class="map-controls" aria-label="Térképvezérlők">
        <button class="map-btn" id="zoomIn" aria-label="Nagyítás">+</button>
        <button class="map-btn" id="zoomOut" aria-label="Kicsinyítés">−</button>
        <button class="map-btn" id="zoomReset" aria-label="Eredeti méret">⌂</button>
      </div>
      <p class="map-hint" id="mapHint">Húzd a térképet, görgess a nagyításhoz. Kattints a pecsétekre.</p>
    </section>

    <!-- GALLERY VIEW -->
    <section class="view gallery-view" id="galleryView" hidden>
      <div class="gallery-filter">
        <label for="eraFilter">Szűrő:</label>
        <select id="eraFilter">
          <option value="all">Minden korszak</option>
        </select>
      </div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </section>
  </main>

  <!-- TIMELINE -->
  <footer class="timeline" id="timeline" aria-label="Idővonal">
    <div class="timeline-track" id="timelineTrack">
      <div class="timeline-line"></div>
      <div class="timeline-nodes" id="timelineNodes"></div>
      <div class="timeline-eras" id="timelineEras"></div>
    </div>
  </footer>

  <!-- CARD MODAL -->
  <div class="modal-backdrop" id="cardModal" hidden>
    <div class="modal-frame" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Bezárás">✕</button>
      <div class="card-stage">
        <div class="card" id="cardEl">
          <div class="card-face card-front">
            <img id="cardFrontImg" alt="" />
          </div>
          <div class="card-face card-back">
            <img id="cardBackImg" alt="" />
          </div>
        </div>
        <p class="flip-hint">Kattints a kártyára a fordításhoz</p>
      </div>
      <div class="card-meta">
        <h2 id="modalTitle"></h2>
        <p class="card-era"><span class="label">Korszak:</span> <span id="modalEra"></span></p>
        <p class="card-description" id="modalDescription"></p>
      </div>
      <div class="modal-nav">
        <button class="modal-nav-btn" id="prevCard">◄ Előző</button>
        <button class="modal-nav-btn" id="nextCard">Következő ►</button>
      </div>
    </div>
  </div>

  <!-- SIDE DRAWER -->
  <aside class="drawer" id="drawer" hidden aria-label="Menü">
    <button class="drawer-close" id="drawerClose" aria-label="Bezárás">✕</button>
    <h2>Világok Harca</h2>
    <p class="drawer-sub">Az Aranyelme műhely krónikája</p>
    <nav class="drawer-nav">
      <button class="drawer-link" data-view="map">Térkép</button>
      <button class="drawer-link" data-view="gallery">Kártyagyűjtemény</button>
    </nav>
    <p class="drawer-footer">Richard Fejes &amp; az Aranyelme műhely · 2026</p>
  </aside>

  <script src="js/data-loader.js?v=6"></script>
  <script src="js/map.js?v=6"></script>
  <script src="js/cards.js?v=6"></script>
  <script src="js/timeline.js?v=6"></script>
  <script src="js/app.js?v=6"></script>
</body>
</html>
